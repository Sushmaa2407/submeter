name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # A placeholder is enough for the build step — it never
          # actually connects during `next build`, but Prisma's
          # client generation requires the env var to be present.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          AUTH_SECRET: "ci-placeholder-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

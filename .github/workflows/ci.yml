name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # A placeholder is enough for the build step — it never
          # actually connects during `next build`, but Prisma's
          # client generation requires the env var to be present.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          AUTH_SECRET: "ci-placeholder-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          # Same reasoning: lib/stripe.ts already has its own
          # fallback so a missing key never crashes the build, but
          # setting these here too means CI never even needs to
          # rely on that fallback in the first place.
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_test_placeholder"
